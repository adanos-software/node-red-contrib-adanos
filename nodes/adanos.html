<script type="text/javascript">
  (function () {
    const BRAND_COLOR = "#4f8f86";
    const ICON = "adanos.svg";

    function commonDefaults(extra) {
      return Object.assign({
        name: { value: "" },
        connection: { value: "", type: "adanos-config", required: true },
        from: { value: "" },
        to: { value: "" },
        days: { value: "" },
      }, extra);
    }

    function prepareTypedInput(selector, typeSelector, types) {
      $(selector).typedInput({
        default: types[0],
        typeField: $(typeSelector),
        types: types,
      });
    }

    function nodeDefinition(label, defaults, oneditprepare) {
      return {
        category: "Adanos",
        color: BRAND_COLOR,
        defaults: defaults,
        inputs: 1,
        outputs: 1,
        icon: ICON,
        paletteLabel: label,
        label: function () {
          return this.name || `Adanos ${label}`;
        },
        oneditprepare: oneditprepare,
      };
    }

    RED.nodes.registerType("adanos-config", {
      category: "config",
      defaults: {
        name: { value: "Adanos API" },
      },
      credentials: {
        apiKey: { type: "password", required: true },
      },
      label: function () {
        return this.name || "Adanos API";
      },
    });

    RED.nodes.registerType("adanos-stock", nodeDefinition(
      "stock",
      commonDefaults({
        platform: { value: "reddit", required: true },
        ticker: { value: "ticker", required: true },
        tickerType: { value: "msg" },
      }),
      function () {
        prepareTypedInput("#node-input-ticker", "#node-input-tickerType", ["msg", "str", "flow", "global", "env"]);
      },
    ));

    RED.nodes.registerType("adanos-crypto", nodeDefinition(
      "crypto",
      commonDefaults({
        symbol: { value: "symbol", required: true },
        symbolType: { value: "msg" },
      }),
      function () {
        prepareTypedInput("#node-input-symbol", "#node-input-symbolType", ["msg", "str", "flow", "global", "env"]);
      },
    ));

    RED.nodes.registerType("adanos-trending", nodeDefinition(
      "trending",
      commonDefaults({
        market: { value: "reddit", required: true },
        limit: {
          value: 10,
          required: true,
          validate: RED.validators.number(),
        },
        offset: {
          value: 0,
          required: true,
          validate: RED.validators.number(),
        },
      }),
    ));

    RED.nodes.registerType("adanos-compare", nodeDefinition(
      "compare",
      commonDefaults({
        market: { value: "reddit", required: true },
        assets: { value: "ticker", required: true },
        assetsType: { value: "msg" },
      }),
      function () {
        prepareTypedInput("#node-input-assets", "#node-input-assetsType", ["msg", "str", "json", "flow", "global", "env"]);
      },
    ));
  }());
</script>

<script type="text/html" data-help-name="adanos-stock">
  <p>Gets a detailed stock sentiment result from Reddit, News, X, or Polymarket.</p>

  <h3>Output</h3>
  <p>Sets the API response on <code>msg.payload</code>. If <code>msg.topic</code> is empty, the node sets an Adanos operation topic.</p>
  <h3>Period</h3>
  <p>Use an explicit <code>from</code>/<code>to</code> window or <code>days</code>. Do not combine <code>from</code> with <code>days</code>.</p>
