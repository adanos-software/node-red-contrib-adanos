name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 18
            node_red: 4.1.11
          - node: 22
            node_red: 5.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm install --no-save node-red@${{ matrix.node_red }}
      - run: npm run check:syntax
      - run: npm test
      - run: npm pack --dry-run
